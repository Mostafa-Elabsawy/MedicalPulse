<section class="flex h-screen overflow-hidden bg-gray-50">

    <!-- Overlay (Mobile) -->
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-10 lg:hidden transition-all duration-300" [class.opacity-0]="!menu()" [class.pointer-events-none]="!menu()" (click)="toggle()">
    </div>

    <!-- Sidebar -->
    <aside class="fixed lg:sticky top-0 left-0 z-20 h-full w-64 
        bg-white/70 backdrop-blur-xl border-r border-gray-200
        px-4 py-4 transform transition-all duration-300 
        lg:translate-x-0 shadow-sm" [class.-translate-x-full]="!menu()" [class.translate-x-0]="menu()">

        <section class="flex flex-col h-full">

            <!-- Logo -->
            <div class="flex items-center gap-3 mb-6 px-2">
                <div class="bg-blue-500 p-2 rounded-xl shadow">
                    <i class="fa-solid fa-heart-pulse text-white text-lg"></i>
                </div>

                <div>
                    <p class="font-bold text-lg text-gray-800 leading-tight">Medical Pulse</p>
                    <p class="text-xs text-gray-500">Patient Portal</p>
                </div>
            </div>

            <!-- Nav -->
            <nav class="flex flex-col gap-2">

                <a routerLink="Patient-Info" routerLinkActive="active" class="nav-item">

                    <i class="fa-solid fa-user text-sm"></i>
                    <span class="text-sm font-medium">Personal Info</span>
                </a>

                <a routerLink="Lab-Results" routerLinkActive="active" class="nav-item">

                    <i class="fa-solid fa-flask text-sm"></i>
                    <span class="text-sm font-medium">Lab Results</span>
                </a>

                <a routerLink="Radiology-Reports" routerLinkActive="active" class="nav-item">

                    <i class="fa-solid fa-x-ray text-sm"></i>
                    <span class="text-sm font-medium">Radiology</span>
                </a>

                <a routerLink="Appointments" routerLinkActive="active" class="nav-item">

                    <i class="fa-solid fa-calendar-days text-sm"></i>
                    <span class="text-sm font-medium">Appointments</span>
                </a>

                <a routerLink="Visits" routerLinkActive="active" class="nav-item">

                    <i class="fa-solid fa-house-medical text-sm"></i>
                    <span class="text-sm font-medium">Visits</span>
                </a>

            </nav>

            <!-- User -->
            <!-- User -->
            <div class="mt-auto pt-4 border-t border-gray-200 space-y-3 flex flex-col-reverse">

                <!-- User Info -->
                <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-100 transition">

                    <img src="placeholder1.jpg" class="w-10 h-10 rounded-full object-cover border border-gray-200" />

                    <div class="overflow-hidden flex-1">
                        <p class="text-sm font-semibold text-gray-800 truncate">
                            Mostafa Ehab
                        </p>
                        <p class="text-xs text-gray-500 truncate">
                            mostafa@email.com
                        </p>
                    </div>

                    <!-- Optional dropdown trigger -->
                    <button class="text-gray-400 hover:text-gray-600">
                        <i class="pi pi-ellipsis-v text-sm"></i>
                    </button>

                </div>

                <!-- Logout Button -->
                <button class="w-full flex items-center justify-center gap-2 bg-red-50 text-red-600 hover:bg-red-100 
               py-2.5 rounded-xl text-sm font-medium 
               transition-all border border-red-100">

                    <i class="pi pi-sign-out text-sm"></i>
                    Logout

                </button>

            </div>

        </section>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-auto">

        <!-- Header -->
        <header class="sticky top-0 z-10 
            bg-white/70 backdrop-blur-xl border-b border-gray-200 
            px-6 py-4 flex items-center gap-3 shadow-sm">

            <button (click)="toggle()" class="lg:hidden">
                <i class="fa fa-bars text-xl text-gray-600"></i>
            </button>

            <h1 class="text-lg font-semibold text-gray-700">
                Patient Portal
            </h1>

        </header>

        <!-- Content -->
        <div class="p-4 md:p-6 2xl:container mx-auto">
            <router-outlet></router-outlet>
        </div>

    </main>

</section>
