<section class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <div class="w-full max-w-md bg-white/70 backdrop-blur-xl border border-gray-100 shadow-lg rounded-2xl p-8">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-6">

            <div class="bg-blue-500 p-3 rounded-xl shadow mb-3">
                <i class="fa-solid fa-heart-pulse text-white text-xl"></i>
            </div>

            <h1 class="text-2xl font-bold text-gray-800">Medical Pulse</h1>

            <p class="text-gray-500 text-sm">
                {{ mode === 'login' ? 'Patient Portal Login' : 'Create new account' }}
            </p>

        </div>

        <!-- Form -->
        <form (ngSubmit)="onSubmit()" class="space-y-4">

            <!-- Name (only register) -->
            <div *ngIf="mode === 'register'">
                <label class="text-sm text-gray-600 mb-1 block">Full Name</label>
                <input type="text" [(ngModel)]="name" name="name" placeholder="Enter your name" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 
                 focus:ring-2 focus:ring-blue-400 focus:outline-none 
                 bg-white/80 text-sm" />
            </div>

            <!-- Email -->
            <div>
                <label class="text-sm text-gray-600 mb-1 block">Email</label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 
                 focus:ring-2 focus:ring-blue-400 focus:outline-none 
                 bg-white/80 text-sm" />
            </div>

            <!-- Password -->
            <div>
                <label class="text-sm text-gray-600 mb-1 block">Password</label>
                <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 
                 focus:ring-2 focus:ring-blue-400 focus:outline-none 
                 bg-white/80 text-sm" />
            </div>

            <!-- Login extras -->
            <div *ngIf="mode === 'login'" class="flex items-center justify-between text-sm">

                <label class="flex items-center gap-2 text-gray-600">
                    <input type="checkbox" [(ngModel)]="remember" name="remember" class="rounded border-gray-300">
                    Remember me
                </label>

                <a href="#" class="text-blue-500 hover:underline">
                    Forgot password?
                </a>

            </div>

            <!-- Button -->
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white 
               py-2.5 rounded-xl font-medium transition-all shadow">
                {{ mode === 'login' ? 'Login' : 'Create Account' }}
            </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center gap-2 my-5">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-xs text-gray-400">OR</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Social -->
        <div class="space-y-2">

            <button class="w-full flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-2.5 hover:bg-gray-100 transition text-sm">
                <i class="fa-brands fa-google"></i>
                Continue with Google
            </button>

            <button class="w-full flex items-center justify-center gap-2 border border-gray-200 rounded-xl py-2.5 hover:bg-gray-100 transition text-sm">
                <i class="fa-brands fa-facebook"></i>
                Continue with Facebook
            </button>

        </div>

        <!-- Switch Mode -->
        <p class="text-center text-sm text-gray-500 mt-5">
            {{ mode === 'login' ? "Don't have an account?" : "Already have an account?" }}
            <button type="button" (click)="toggleMode()" class="text-blue-500 hover:underline ml-1">
                {{ mode === 'login' ? 'Register' : 'Login' }}
            </button>
        </p>

    </div>

</section>
