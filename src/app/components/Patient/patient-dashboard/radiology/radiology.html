<div class=" bg-gray-50 min-h-screen space-y-6">

    <!-- Header -->
    <div class="flex items-center justify-between bg-white/70 backdrop-blur px-6 py-5 rounded-2xl border border-gray-100 shadow-sm">

        <div>
            <h2 class="text-2xl font-bold text-gray-800 tracking-tight">
                Radiology Reports
            </h2>

            <p class="text-gray-500 text-sm mt-1">
                Download or view your radiology reports
            </p>
        </div>

        <div class="flex items-center gap-2 text-sm text-gray-600 bg-gray-100 px-4 py-2 rounded-xl font-medium">
            <i class="pi pi-file text-xs"></i>
            {{ radiologyReports.length }} reports
        </div>

    </div>

    <!-- Grid -->
    <div class="grid md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6">

        @for (item of radiologyReports; track $index) {
        <div>

            <div class="flex flex-col h-full bg-white/70 backdrop-blur rounded-2xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 p-5 border border-gray-100 gap-4">

                <!-- Top Section -->
                <div class="flex items-center gap-4">

                    <!-- Left Image / Icon -->
                    <div class="w-28 h-28 rounded-xl bg-black/10  flex items-center justify-center shrink-0 relative overflow-hidden">

                        <i class="fa fa-x-ray text-gray-600 text-4xl"></i>

                        <!-- subtle overlay -->
                        <div class="absolute inset-0 bg-white/10"></div>
                    </div>

                    <!-- Right Content -->
                    <div class="flex flex-col flex-1">

                        <h3 class="font-semibold text-lg text-gray-800 leading-snug line-clamp-2">
                            {{ item.title }}
                        </h3>

                        <div class="flex items-center gap-2 text-sm text-gray-500 mt-2">
                            <i class="pi pi-calendar text-xs"></i>
                            <span>{{ item.date }}</span>
                        </div>

                    </div>

                </div>

                <!-- Divider -->
                <div class="border-t border-gray-100"></div>

                <!-- Actions -->
                <div class="flex flex-col gap-2">

                    <p-button type="button" severity="secondary" label="AI Scan" icon="pi pi-eye" styleClass="w-full !rounded-xl !text-sm">
                    </p-button>

                    <p-button type="button" severity="primary" label="Download" icon="pi pi-download" styleClass="w-full !rounded-xl !text-sm">
                    </p-button>

                </div>

            </div>

        </div>
        }

    </div>

</div>
