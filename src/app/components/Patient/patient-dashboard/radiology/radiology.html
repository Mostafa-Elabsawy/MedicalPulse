<div class="space-y-3 animate-fade-in p-4">

    <!-- Header -->
    <div class="flex items-center justify-between bg-white px-4 rounded-xl">
        <div class="p-5 rounded-2xl">

            <div>
                <h2 class="text-2xl font-bold text-black ">
                    Radiology Reports
                </h2>

                <p class="text-gray-500 text-sm mt-1">
                    Download or view your radiology reports
                </p>
            </div>

        </div>

        <div class="flex items-center gap-2 text-sm text-gray-500 bg-gray-100 px-3 py-1 rounded-lg">
            <i class="pi pi-file text-xs"></i>
            {{ radiologyReports.length }} reports
        </div>
    </div>

    <!-- Grid -->
    <div class="grid  md:grid-cols-2  xl:grid-cols-3 2xl:grid-cols-4 gap-5">
        @for (item of radiologyReports; track $index) {
<div class="flex flex-col bg-white rounded-2xl shadow-sm hover:shadow-lg transition-all duration-300 p-4 border border-gray-100 gap-4">

    <!-- Top Section -->
    <div class="flex items-center gap-4">

        <!-- Left Image -->
        <div class="w-28 h-28 rounded-xl bg-sky-50 flex items-center justify-center shrink-0 overflow-hidden">
            <i class="fa fa-x-ray text-sky-400 text-5xl"></i>
        </div>

        <!-- Right Content -->
        <div class="flex flex-col flex-1">

            <h3 class="font-semibold text-lg text-gray-800">
                {{ item.title }}
            </h3>

            <div class="flex items-center gap-2 text-sm text-gray-500 mt-1">
                <i class="pi pi-calendar text-xs"></i>
                <span>{{ item.date }}</span>
            </div>

        </div>

    </div>

    <!-- Bottom Actions -->
    <div class="flex gap-2 justify-start border-t pt-1 border-gray-100">

        <p-button type="button" severity="secondary" label="AI Scan" icon="pi pi-eye">
        </p-button>

        <p-button type="button" severity="secondary" label="Download" icon="pi pi-download">
        </p-button>

    </div>

</div>
        }

    </div>
</div>
